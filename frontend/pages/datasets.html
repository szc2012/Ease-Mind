<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据集 - EaseMind</title>
  <link rel="stylesheet" href="/assets/css/polish.css">
  <link rel="icon" type="image/svg+xml" href="/assets/ease-mind-logo.svg">
</head>
<body>
  <script src="/assets/js/app.js"></script>
  <script>
    if (!App.requireAdmin()) throw new Error("no access");

    App.renderShell("datasets", "数据集管理", `
      <div class="grid grid-2 mb-3">
        <div class="card">
          <div class="card-header">
            <div>
              <div class="card-title">上传文件</div>
              <div class="card-subtitle">支持 docx / txt / md / csv / json / jsonl 格式</div>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">选择文件</label>
            <input class="form-input" type="file" id="file-input" accept=".docx,.txt,.md,.csv,.json,.jsonl">
          </div>
          <button class="btn btn-primary" id="upload-btn">上传数据集</button>
        </div>

        <div class="card">
          <div class="card-header">
            <div>
              <div class="card-title">抓取网页</div>
              <div class="card-subtitle">输入网页地址，自动提取正文内容</div>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">网页地址</label>
            <input class="form-input" id="url-input" placeholder="https://example.com/article">
          </div>
          <div class="form-group">
            <label class="form-label">数据集名称（可选）</label>
            <input class="form-input" id="url-name" placeholder="留空则使用网址">
          </div>
          <button class="btn btn-primary" id="url-btn">抓取并保存</button>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-title">数据集列表</div>
            <div class="card-subtitle">已上传的所有训练数据</div>
          </div>
          <button class="btn btn-secondary btn-sm" onclick="loadDatasets()">刷新</button>
        </div>
        <div id="ds-list"></div>
      </div>
    `);

    document.getElementById("upload-btn").onclick = async () => {
      const input = document.getElementById("file-input");
      if (!input.files[0]) { App.toast("请先选择文件", "error"); return; }
      const fd = new FormData();
      fd.append("file", input.files[0]);
      const btn = document.getElementById("upload-btn");
      btn.disabled = true; btn.textContent = "上传中...";
      try {
        await App.api.upload("/api/datasets/upload", fd);
        App.toast("数据集上传成功", "success");
        input.value = "";
        loadDatasets();
      } catch (err) { App.toast(err.message, "error"); }
      finally { btn.disabled = false; btn.textContent = "上传数据集"; }
    };

    document.getElementById("url-btn").onclick = async () => {
      const url = document.getElementById("url-input").value.trim();
      const name = document.getElementById("url-name").value.trim();
      if (!url) { App.toast("请输入网页地址", "error"); return; }
      const btn = document.getElementById("url-btn");
      btn.disabled = true; btn.textContent = "抓取中...";
      try {
        await App.api.post("/api/datasets/url", { url, name: name || null });
        App.toast("网页抓取成功", "success");
        document.getElementById("url-input").value = "";
        document.getElementById("url-name").value = "";
        loadDatasets();
      } catch (err) { App.toast(err.message, "error"); }
      finally { btn.disabled = false; btn.textContent = "抓取并保存"; }
    };

    let _datasetsCache = [];

    async function loadDatasets() {
      const el = document.getElementById("ds-list");
      try {
        const list = await App.api.get("/api/datasets");
        _datasetsCache = list;
        if (list.length === 0) {
          el.innerHTML = `<div class="empty-state"><div class="empty-icon">▤</div><div class="empty-text">暂无数据集</div></div>`;
          return;
        }
        el.innerHTML = list.map(d => `
          <div class="list-item">
            <div class="list-item-main">
              <div class="list-item-title">${App.escapeHtml(d.name)} <span class="tag">${d.source_type === "url" ? "网页" : "文件"}</span></div>
              <div class="list-item-sub">
                ${d.sample_count} 样本 · ${d.char_count} 字符 · ${App.formatTime(d.created_at)}<br>
                <span class="text-muted">${App.escapeHtml((d.content_preview || "").slice(0, 80))}...</span>
              </div>
            </div>
            <div class="flex items-center gap-1">
              <button class="btn btn-ghost btn-sm" onclick="preview('${d.id}')">预览</button>
              <button class="btn btn-danger btn-sm" onclick="delDs('${d.id}','${App.escapeJsAttr(d.name)}')">删除</button>
            </div>
          </div>
        `).join("");
      } catch (err) { App.toast(err.message, "error"); }
    }

    function preview(id) {
      const d = (_datasetsCache || []).find(x => x.id === id);
      if (!d) { App.toast("数据集不存在", "error"); return; }
      const body = document.createElement("div");
      body.innerHTML = `
        <div class="form-group"><label class="form-label">来源</label><div class="text-sm">${App.escapeHtml(d.source_info || "-")}</div></div>
        <div class="form-group"><label class="form-label">统计</label><div class="text-sm">${d.sample_count} 样本 · ${d.char_count} 字符</div></div>
        <div class="form-group"><label class="form-label">内容预览</label><pre class="log-viewer" style="max-height:300px">${App.escapeHtml(d.content_preview || "")}</pre></div>
      `;
      App.modal({ title: `数据集：${App.escapeHtml(d.name)}`, body });
    }

    async function delDs(id, name) {
      if (!confirm(`确定删除数据集「${name}」吗？`)) return;
      try {
        await App.api.delete(`/api/datasets/${id}`);
        App.toast("数据集已删除", "success");
        loadDatasets();
      } catch (err) { App.toast(err.message, "error"); }
    }

    loadDatasets();
  </script>
</body>
</html>
