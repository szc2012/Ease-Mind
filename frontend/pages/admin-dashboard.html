<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>概览 - EaseMind</title>
  <link rel="stylesheet" href="/assets/css/polish.css">
  <link rel="icon" type="image/svg+xml" href="/assets/ease-mind-logo.svg">
</head>
<body>
  <script src="/assets/js/app.js"></script>
  <script>
    if (!App.requireAdmin()) throw new Error("no access");

    App.renderShell("dashboard", "工作台概览", `
      <!-- 顶部 KPI 小卡片 -->
      <div class="db-kpi-row">
        <div class="db-kpi">
          <div class="db-kpi-icon" style="background:#F4E9E0;color:var(--accent)">❖</div>
          <div class="db-kpi-info">
            <div class="db-kpi-value" id="kpi-models">-</div>
            <div class="db-kpi-label">可用模型</div>
          </div>
        </div>
        <div class="db-kpi">
          <div class="db-kpi-icon" style="background:#E8F0EA;color:var(--success)">✦</div>
          <div class="db-kpi-info">
            <div class="db-kpi-value" id="kpi-finetuned">-</div>
            <div class="db-kpi-label">微调模型</div>
          </div>
        </div>
        <div class="db-kpi">
          <div class="db-kpi-icon" style="background:#FAF3E0;color:var(--warning)">▤</div>
          <div class="db-kpi-info">
            <div class="db-kpi-value" id="kpi-datasets">-</div>
            <div class="db-kpi-label">数据集</div>
          </div>
        </div>
        <div class="db-kpi">
          <div class="db-kpi-icon" style="background:#F4E9E0;color:var(--accent)">✿</div>
          <div class="db-kpi-info">
            <div class="db-kpi-value" id="kpi-tasks">-</div>
            <div class="db-kpi-label">训练任务</div>
          </div>
        </div>
      </div>

      <!-- 系统资源条带：GPU 显存 / 磁盘占用 / 活跃任务数 -->
      <div class="sys-row">
        <div class="sys-card">
          <div class="sys-card-head">
            <span class="sys-card-title">⚡ GPU 显存</span>
            <span class="sys-card-badge" id="sys-gpu-badge">-</span>
          </div>
          <div class="sys-card-body">
            <div class="sys-metric-main" id="sys-gpu-main">-</div>
            <div class="sys-metric-sub" id="sys-gpu-sub">读取中...</div>
          </div>
        </div>
        <div class="sys-card">
          <div class="sys-card-head">
            <span class="sys-card-title">▤ 磁盘占用</span>
            <span class="sys-card-badge" id="sys-disk-badge">-</span>
          </div>
          <div class="sys-card-body">
            <div class="sys-metric-main" id="sys-disk-main">-</div>
            <div class="sys-metric-sub" id="sys-disk-sub">读取中...</div>
          </div>
        </div>
        <div class="sys-card">
          <div class="sys-card-head">
            <span class="sys-card-title">▶ 活跃任务</span>
            <span class="sys-card-badge" id="sys-task-badge">-</span>
          </div>
          <div class="sys-card-body">
            <div class="sys-metric-main" id="sys-task-main">-</div>
            <div class="sys-metric-sub" id="sys-task-sub">读取中...</div>
          </div>
        </div>
      </div>

      <!-- 主网格 -->
      <div class="db-grid">
        <!-- 训练工作台 + 数据集 -->
        <div class="db-col db-col-main">
          <div class="db-card training-card">
            <div class="db-card-head">
              <div>
                <div class="db-card-title">训练工作台</div>
                <div class="db-card-sub" id="workbench-subtitle">一键启动模型训练</div>
              </div>
              <a class="db-btn-primary" href="/pages/finetune.html">▶ 开始训练</a>
            </div>
            <div class="db-card-body">
              <div class="loss-header">
                <span class="loss-title">Loss 曲线</span>
                <div class="loss-legend">
                  <span class="loss-legend-item train"><i></i>训练</span>
                  <span class="loss-legend-item distill"><i></i>蒸馏</span>
                </div>
              </div>
              <div class="loss-chart" id="loss-chart">
                <svg viewBox="0 0 640 160" preserveAspectRatio="none">
                  <defs>
                    <linearGradient id="trainFill" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stop-color="#CC785C" stop-opacity="0.16"/>
                      <stop offset="100%" stop-color="#CC785C" stop-opacity="0"/>
                    </linearGradient>
                    <linearGradient id="distillFill" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stop-color="#E8A951" stop-opacity="0.16"/>
                      <stop offset="100%" stop-color="#E8A951" stop-opacity="0"/>
                    </linearGradient>
                  </defs>
                  <g class="grid-lines">
                    <line x1="36" y1="18" x2="620" y2="18"/>
                    <line x1="36" y1="58" x2="620" y2="58"/>
                    <line x1="36" y1="98" x2="620" y2="98"/>
                    <line x1="36" y1="138" x2="620" y2="138"/>
                  </g>
                  <g class="axis-labels">
                    <text x="4" y="14">1.5</text>
                    <text x="10" y="74">0.5</text>
                    <text x="16" y="142">0</text>
                    <text x="36" y="155">0</text>
                    <text x="620" y="155" text-anchor="end">1500</text>
                  </g>
                  <path id="train-area" d="" fill="url(#trainFill)"/>
                  <path id="train-line" d="" fill="none" stroke="#CC785C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <path id="distill-area" d="" fill="url(#distillFill)"/>
                  <path id="distill-line" d="" fill="none" stroke="#E8A951" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </div>
          </div>

          <div class="db-card">
            <div class="db-card-head">
              <div class="db-card-title">数据集</div>
              <a class="db-link" href="/pages/datasets.html">管理 →</a>
            </div>
            <div class="db-card-body compact">
              <div class="db-dataset-list" id="dataset-list">
                <div class="db-empty">暂无数据集</div>
              </div>
            </div>
          </div>
        </div>

        <!-- 右侧边列 -->
        <div class="db-col db-col-side">
          <div class="db-card">
            <div class="db-card-head">
              <div class="db-card-title">模型卡片</div>
              <a class="db-link" href="/pages/models.html">管理 →</a>
            </div>
            <div class="db-card-body compact">
              <div class="db-model-list" id="model-list">
                <div class="db-empty">暂无可用模型</div>
              </div>
            </div>
          </div>

          <div class="db-card">
            <div class="db-card-head">
              <div class="db-card-title">真实推理对话</div>
              <a class="db-link" href="/pages/chat.html">进入 →</a>
            </div>
            <div class="db-card-body compact">
              <div class="db-chat-preview">
                <div class="db-chat-msg user">
                  <div class="db-chat-text">你好，请介绍一下你自己。</div>
                </div>
                <div class="db-chat-msg assistant">
                  <div class="db-chat-text">你好！我是 Ease-Mind 训练的模型，很高兴为你服务。</div>
                </div>
              </div>
            </div>
          </div>

          <div class="db-card">
            <div class="db-card-head">
              <div>
                <div class="db-card-title">训练日志</div>
                <div class="db-card-sub" id="log-subtitle">实时</div>
              </div>
              <span class="badge badge-accent" id="log-status">待机中</span>
            </div>
            <div class="db-card-body compact">
              <div class="db-log-list" id="log-list">
                <div class="db-empty">暂无训练日志</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    `);

    const FILE_ICONS = {
      docx: { icon: "W", color: "#4A7C9B", bg: "#E8F0F5" },
      txt: { icon: "T", color: "#B8860B", bg: "#FAF3E0" },
      md: { icon: "M", color: "#4A7C59", bg: "#E8F0EA" },
      csv: { icon: "C", color: "#4A7C59", bg: "#E8F0EA" },
      json: { icon: "J", color: "#7C5C9B", bg: "#F0EBF5" },
      jsonl: { icon: "J", color: "#7C5C9B", bg: "#F0EBF5" },
      url: { icon: "☍", color: "#CC785C", bg: "#F4E9E0" },
    };

    function fileMeta(name) {
      const suffix = (name || "").split(".").pop().toLowerCase();
      return FILE_ICONS[suffix] || FILE_ICONS.url;
    }

    function drawLossChart(trainPoints, distillPoints) {
      const chart = document.getElementById("loss-chart");
      const trainLine = chart.querySelector("#train-line");
      const trainArea = chart.querySelector("#train-area");
      const distillLine = chart.querySelector("#distill-line");
      const distillArea = chart.querySelector("#distill-area");

      const draw = (points) => {
        if (!points || points.length === 0) return { lineD: "", areaD: "" };
        // 过滤掉 loss 为 null/undefined 的点，防止 NaN 污染曲线
        const valid = points.filter(p => p.loss != null && !isNaN(p.loss));
        if (valid.length === 0) return { lineD: "", areaD: "" };
        const steps = valid.map(p => p.step || p.global_step || 0);
        const losses = valid.map(p => p.loss);
        const minStep = Math.min(...steps);
        const maxStep = Math.max(...steps);
        const minLoss = Math.min(...losses);
        const maxLoss = Math.max(...losses);
        const rangeLoss = Math.max(maxLoss - minLoss, 0.01);
        const rangeStep = Math.max(maxStep - minStep, 1);

        const padTop = 14, padBottom = 22, padLeft = 36, padRight = 20;
        const width = 640 - padLeft - padRight;
        const height = 160 - padTop - padBottom;

        const pts = valid.map(p => {
          const x = padLeft + ((p.step - minStep) / rangeStep) * width;
          const y = padTop + (1 - (p.loss - minLoss) / rangeLoss) * height;
          return [x, y];
        });

        const lineD = pts.length
          ? `M ${pts[0][0]} ${pts[0][1]} ` + pts.slice(1).map(p => `L ${p[0]} ${p[1]}`).join(" ")
          : "";
        const areaD = lineD
          ? `${lineD} L ${pts[pts.length - 1][0]} ${padTop + height} L ${pts[0][0]} ${padTop + height} Z`
          : "";
        return { lineD, areaD };
      };

      const t = draw(trainPoints);
      const d = draw(distillPoints);
      trainLine.setAttribute("d", t.lineD);
      trainArea.setAttribute("d", t.areaD);
      distillLine.setAttribute("d", d.lineD);
      distillArea.setAttribute("d", d.areaD);
    }

    async function loadWorkbench() {
      try {
        const tasks = await App.api.get("/api/training");
        const distillTasks = await App.api.get("/api/distillation");
        const runningTask = tasks.find(t => t.status === "running");
        const runningDistill = distillTasks.find(t => t.status === "running");
        const latestTask = runningTask || tasks[0];
        const latestDistill = runningDistill || distillTasks[0];

        let trainPoints = [];
        let distillPoints = [];
        if (latestTask) {
          const r = await App.api.get(`/api/training/${latestTask.id}/loss`);
          trainPoints = r.data?.points || [];
        }
        if (latestDistill) {
          const r = await App.api.get(`/api/distillation/${latestDistill.id}/loss`);
          distillPoints = r.data?.points || [];
        }

        if (!trainPoints.length && !distillPoints.length) {
          trainPoints = Array.from({ length: 20 }, (_, i) => ({ step: i * 75, loss: 1.5 - (i * 0.06) + Math.random() * 0.08 }));
          distillPoints = Array.from({ length: 20 }, (_, i) => ({ step: i * 75, loss: 1.2 - (i * 0.05) + Math.random() * 0.06 }));
        }

        drawLossChart(trainPoints, distillPoints);

        const subtitle = document.getElementById("workbench-subtitle");
        if (runningTask || runningDistill) {
          subtitle.textContent = runningTask ? `运行中：${App.escapeHtml(runningTask.name)}` : "蒸馏任务运行中";
        } else if (latestTask) {
          subtitle.textContent = `最近：${App.escapeHtml(latestTask.name)}`;
        } else {
          subtitle.textContent = "一键启动模型训练";
        }
      } catch (err) {
        console.error("loadWorkbench error", err);
      }
    }

    async function loadModels() {
      try {
        const models = await App.api.get("/api/models");
        const ready = models.filter(m => m.status === "ready").slice(0, 4);
        const el = document.getElementById("model-list");
        if (ready.length === 0) {
          el.innerHTML = `<div class="db-empty">暂无可用模型，请先下载</div>`;
          return;
        }
        el.innerHTML = ready.map(m => `
          <div class="db-model-item">
            <div class="db-model-icon">❖</div>
            <div class="db-model-info">
              <div class="db-model-name">${App.escapeHtml(m.name)}</div>
              <div class="db-model-tag">${m.source === "finetune" ? "LoRA" : "基础模型"}</div>
            </div>
            ${m.is_active ? '<span class="badge badge-accent">可对话</span>' : ''}
          </div>
        `).join("");
      } catch (err) {
        console.error("loadModels error", err);
      }
    }

    async function loadDatasets() {
      try {
        const datasets = await App.api.get("/api/datasets");
        const el = document.getElementById("dataset-list");
        if (datasets.length === 0) {
          el.innerHTML = `<div class="db-empty">暂无数据集</div>`;
          return;
        }
        el.innerHTML = datasets.slice(0, 5).map(d => {
          const meta = fileMeta(d.source_info || d.name);
          return `
            <div class="db-dataset-item">
              <div class="db-dataset-icon" style="background:${meta.bg};color:${meta.color}">${meta.icon}</div>
              <div class="db-dataset-info">
                <div class="db-dataset-name">${App.escapeHtml(d.name)}</div>
                <div class="db-dataset-meta">${d.sample_count} 样本 · ${d.char_count} 字符</div>
              </div>
              <div class="db-dataset-check">✓</div>
            </div>
          `;
        }).join("");
      } catch (err) {
        console.error("loadDatasets error", err);
      }
    }

    async function loadLogs() {
      try {
        const tasks = await App.api.get("/api/training");
        const distillTasks = await App.api.get("/api/distillation");
        const all = [...tasks, ...distillTasks].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
        const running = all.find(t => t.status === "running");
        const target = running || all[0];
        const el = document.getElementById("log-list");
        const statusEl = document.getElementById("log-status");
        const subEl = document.getElementById("log-subtitle");

        if (!target) {
          statusEl.textContent = "待机中";
          statusEl.className = "badge badge-neutral";
          el.innerHTML = `<div class="db-empty">暂无训练日志</div>`;
          return;
        }

        statusEl.textContent = target.status === "running" ? "Streaming" : target.status;
        const badgeMatch = App.statusBadge(target.status).match(/class="([^"]+)"/);
        statusEl.className = target.status === "running" ? "badge badge-accent" : (badgeMatch ? badgeMatch[1] : "badge badge-neutral");
        subEl.textContent = target.status === "running" ? "实时" : "最近";

        const type = "dataset_ids" in target ? "training" : "distillation";
        const prefix = type === "training" ? "/api/training" : "/api/distillation";
        const r = await App.api.get(`${prefix}/${target.id}/log`);
        const logText = r.data?.log || "";
        const lines = logText.trim().split("\n").filter(Boolean).slice(-4);
        if (lines.length === 0) {
          el.innerHTML = `<div class="db-empty">暂无日志内容</div>`;
          return;
        }
        el.innerHTML = lines.map(line => {
          const time = line.match(/^\[(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})\]/)?.[1]?.slice(11, 19) || "";
          let text = App.escapeHtml(line.replace(/^\[.*?\]\s*/, ""));
          if (text.length > 60) text = text.slice(0, 60) + "...";
          return `<div class="db-log-line"><span class="db-log-time">${time}</span><span class="db-log-text">${text}</span></div>`;
        }).join("");
      } catch (err) {
        console.error("loadLogs error", err);
      }
    }

    async function loadKpis() {
      try {
        const [models, datasets, tasks] = await Promise.all([
          App.api.get("/api/models"),
          App.api.get("/api/datasets"),
          App.api.get("/api/training"),
        ]);
        const readyModels = models.filter(m => m.status === "ready");
        document.getElementById("kpi-models").textContent = readyModels.length;
        document.getElementById("kpi-finetuned").textContent = models.filter(m => m.source === "finetune").length;
        document.getElementById("kpi-datasets").textContent = datasets.length;
        document.getElementById("kpi-tasks").textContent = tasks.length;
      } catch (err) {
        console.error("loadKpis error", err);
      }
    }

    async function loadSystemStatus() {
      const gpuMain = document.getElementById("sys-gpu-main");
      const gpuSub = document.getElementById("sys-gpu-sub");
      const gpuBadge = document.getElementById("sys-gpu-badge");
      const diskMain = document.getElementById("sys-disk-main");
      const diskSub = document.getElementById("sys-disk-sub");
      const diskBadge = document.getElementById("sys-disk-badge");
      const taskMain = document.getElementById("sys-task-main");
      const taskSub = document.getElementById("sys-task-sub");
      const taskBadge = document.getElementById("sys-task-badge");
      try {
        const r = await App.api.get("/api/system/status");
        const data = r?.data || {};
        // GPU
        const gpu = data.gpu || {};
        if (gpu.device === "cuda" && gpu.total_human) {
          gpuBadge.textContent = gpu.name || "CUDA";
          gpuBadge.className = "sys-card-badge badge-success";
          gpuMain.textContent = gpu.allocated_human || "0 B";
          gpuSub.textContent = `已用 / 总显存 ${gpu.total_human}`;
        } else if (gpu.device === "mps") {
          gpuBadge.textContent = "MPS";
          gpuBadge.className = "sys-card-badge badge-accent";
          gpuMain.textContent = "Apple GPU";
          gpuSub.textContent = gpu.detail || "MPS 显存不可精确查询";
        } else {
          gpuBadge.textContent = "CPU";
          gpuBadge.className = "sys-card-badge badge-neutral";
          gpuMain.textContent = "无 GPU";
          gpuSub.textContent = gpu.detail || "仅 CPU 模式";
        }
        // 磁盘
        const disk = data.disk || {};
        const total = disk.data_total || {};
        const part = disk.partition || {};
        diskBadge.textContent = part.used_human ? `分区 ${part.used_human}/${part.total_human}` : "-";
        diskBadge.className = "sys-card-badge badge-neutral";
        diskMain.textContent = total.human || "-";
        const parts = [];
        if (disk.models) parts.push(`模型 ${disk.models.human}`);
        if (disk.datasets) parts.push(`数据 ${disk.datasets.human}`);
        if (disk.logs) parts.push(`日志 ${disk.logs.human}`);
        if (disk.database) parts.push(`DB ${disk.database.human}`);
        diskSub.textContent = parts.join(" · ") + (part.free_human ? ` · 剩余 ${part.free_human}` : "");
        // 活跃任务
        const act = data.active_tasks || {};
        const running = act.running || 0;
        const pending = act.pending || 0;
        taskBadge.textContent = running > 0 ? "运行中" : "空闲";
        taskBadge.className = running > 0 ? "sys-card-badge badge-accent" : "sys-card-badge badge-neutral";
        taskMain.textContent = String(running);
        const detailParts = [];
        if (act.training) detailParts.push(`训练 ${act.training}`);
        if (act.distillation) detailParts.push(`蒸馏 ${act.distillation}`);
        if (pending) detailParts.push(`待执行 ${pending}`);
        taskSub.textContent = detailParts.join(" · ") || "无活跃任务";
      } catch (err) {
        console.error("loadSystemStatus error", err);
        gpuMain.textContent = "-";
        gpuSub.textContent = "读取失败";
        diskMain.textContent = "-";
        diskSub.textContent = "读取失败";
        taskMain.textContent = "-";
        taskSub.textContent = "读取失败";
      }
    }

    async function load() {
      await Promise.all([loadKpis(), loadSystemStatus(), loadWorkbench(), loadModels(), loadDatasets(), loadLogs()]);
    }

    load();
  </script>
</body>
</html>
