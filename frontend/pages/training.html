<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模型训练 - EaseMind</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="icon" type="image/svg+xml" href="/assets/ease-mind-logo.svg">
</head>
<body>
  <script src="/assets/js/app.js"></script>
  <script>
    if (!App.requireAdmin()) throw new Error("no access");

    App.renderShell("training", "模型训练", `
      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-title">专业训练配置</div>
            <div class="card-subtitle">自定义全部训练参数</div>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">基础模型</label>
            <select class="form-select" id="t-model"></select>
          </div>
          <div class="form-group">
            <label class="form-label">任务名称</label>
            <input class="form-input" id="t-name" placeholder="例如：客服模型-专业训练">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">训练数据集（可多选）</label>
          <div id="t-datasets" class="dataset-checklist"></div>
        </div>
        <div id="param-fields"></div>
        <button class="btn btn-primary btn-lg btn-block" id="start-btn">开始专业训练</button>
      </div>

      <div class="card mt-3" id="progress-card" style="display:none">
        <div class="card-header">
          <div>
            <div class="card-title">训练进度</div>
            <div class="card-subtitle">实时 Loss 曲线与日志输出</div>
          </div>
          <div class="flex items-center gap-2">
            <span id="t-status" class="badge badge-accent">运行中</span>
            <span id="pct" class="text-muted text-sm">0%</span>
          </div>
        </div>
        <div class="progress-bar mb-3"><div class="progress-fill" id="p-fill" style="width:0%"></div></div>

        <div class="form-row mb-3" style="align-items:flex-end">
          <div class="form-group" style="margin:0;flex:1">
            <label class="form-label">Loss 曲线</label>
            <div id="loss-chart" class="loss-chart" style="height:240px"></div>
          </div>
          <div style="text-align:right;min-width:140px">
            <div class="text-xs text-muted">当前 Loss</div>
            <div id="cur-loss" style="font-size:22px;font-weight:700;color:var(--accent);font-family:var(--font-serif)">-</div>
            <div class="text-xs text-muted">采样点 <span id="loss-count">0</span></div>
          </div>
        </div>

        <div>
          <label class="form-label">训练日志</label>
          <div id="log-box" class="log-viewer" style="max-height:340px"></div>
        </div>
      </div>

      <div class="card mt-3">
        <div class="card-header">
          <div>
            <div class="card-title">训练任务历史</div>
            <div class="card-subtitle">所有训练与微调记录</div>
          </div>
          <button class="btn btn-secondary btn-sm" onclick="loadHistory()">刷新</button>
        </div>
        <div id="task-history"></div>
      </div>
    `);

    let paramConfig = {};
    let lossVals = [];
    let lossChartTimer = null;

    async function loadOptions() {
      try {
        const [models, datasets] = await Promise.all([
          App.api.get("/api/models"),
          App.api.get("/api/datasets"),
        ]);
        const ready = models.filter(m => m.status === "ready");
        document.getElementById("t-model").innerHTML = ready.length
          ? ready.map(m => `<option value="${m.id}">${App.escapeHtml(m.name)}${m.source === "finetune" ? "（微调模型）" : ""}</option>`)
          : `<option value="">（请先下载模型）</option>`;
        const dsEl = document.getElementById("t-datasets");
        dsEl.innerHTML = datasets.length
          ? datasets.map(d => `
            <label class="checklist-item">
              <input type="checkbox" value="${d.id}">
              <span>${App.escapeHtml(d.name)} <span class="text-muted text-xs">（${d.sample_count}样本）</span></span>
            </label>`).join("")
          : `<div class="text-muted text-sm">（请先上传数据集）</div>`;
      } catch (err) { App.toast(err.message, "error"); }
    }

    async function loadParams() {
      try {
        const data = await App.api.get("/api/training/params");
        paramConfig = data?.data?.professional_params || {};
        const el = document.getElementById("param-fields");
        el.innerHTML = Object.entries(paramConfig).map(([key, cfg]) => `
          <div class="form-group">
            <label class="form-label">${cfg.label} <span class="text-muted text-xs">(${key})</span></label>
            <input class="form-input" type="number" id="param-${key}" value="${cfg.default}" min="${cfg.min}" max="${cfg.max}" step="${key.includes("rate") || key.includes("dropout") || key.includes("decay") ? "0.0001" : "1"}">
            <div class="form-hint">范围 ${cfg.min} ~ ${cfg.max}，默认 ${cfg.default}</div>
          </div>
        `).join("");
      } catch (err) { App.toast(err.message, "error"); }
    }

    // 绘制 Loss 曲线（SVG 折线）
    function drawLossChart() {
      const el = document.getElementById("loss-chart");
      if (!el) return;
      if (lossVals.length === 0) {
        el.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-size:13px">暂无 Loss 数据</div>`;
        return;
      }
      const W = 800, H = 240, P = 40;
      const maxL = Math.max(...lossVals, 0.1);
      const minL = Math.min(...lossVals, 0);
      const range = (maxL - minL) || 1;
      const stepX = lossVals.length > 1 ? (W - 2 * P) / (lossVals.length - 1) : 0;
      const pts = lossVals.map((l, i) => {
        const x = P + i * stepX;
        const y = H - P - ((l - minL) / range) * (H - 2 * P);
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      }).join(" ");
      const lastX = P + (lossVals.length - 1) * stepX;
      const lastY = H - P - ((lossVals[lossVals.length - 1] - minL) / range) * (H - 2 * P);
      const midY = H - P - (0.5) * (H - 2 * P);
      const midVal = (maxL + minL) / 2;
      el.innerHTML = `
        <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:100%">
          <g class="grid-lines">
            <line x1="${P}" y1="${P}" x2="${W - P}" y2="${P}" stroke="#E8E6DC" stroke-dasharray="3 3" stroke-width="1"/>
            <line x1="${P}" y1="${midY}" x2="${W - P}" y2="${midY}" stroke="#E8E6DC" stroke-dasharray="3 3" stroke-width="1"/>
            <line x1="${P}" y1="${H - P}" x2="${W - P}" y2="${H - P}" stroke="#E8E6DC" stroke-dasharray="3 3" stroke-width="1"/>
          </g>
          <line x1="${P}" y1="${P}" x2="${P}" y2="${H - P}" stroke="#D8D5C7" stroke-width="1"/>
          <line x1="${P}" y1="${H - P}" x2="${W - P}" y2="${H - P}" stroke="#D8D5C7" stroke-width="1"/>
          <g class="axis-labels">
            <text x="${P - 6}" y="${P + 4}" text-anchor="end" fill="#b0ada3" font-size="9">${maxL.toFixed(3)}</text>
            <text x="${P - 6}" y="${midY + 3}" text-anchor="end" fill="#b0ada3" font-size="9">${midVal.toFixed(3)}</text>
            <text x="${P - 6}" y="${H - P + 3}" text-anchor="end" fill="#b0ada3" font-size="9">${minL.toFixed(3)}</text>
          </g>
          <polyline points="${pts}" fill="none" stroke="#CC785C" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
          <circle cx="${lastX.toFixed(1)}" cy="${lastY.toFixed(1)}" r="3.5" fill="#CC785C" stroke="#fff" stroke-width="1.5"/>
        </svg>
      `;
    }

    function appendLoss(value) {
      if (typeof value !== "number" || isNaN(value)) return;
      lossVals.push(value);
      const curEl = document.getElementById("cur-loss");
      const cntEl = document.getElementById("loss-count");
      if (curEl) curEl.textContent = value.toFixed(4);
      if (cntEl) cntEl.textContent = lossVals.length;
      // 节流重绘：最多每 300ms 一次
      if (lossChartTimer) return;
      lossChartTimer = setTimeout(() => {
        drawLossChart();
        lossChartTimer = null;
      }, 300);
    }

    document.getElementById("start-btn").onclick = async () => {
      const modelId = document.getElementById("t-model").value;
      const datasetIds = Array.from(document.querySelectorAll('#t-datasets input[type="checkbox"]:checked')).map(cb => cb.value);
      const name = document.getElementById("t-name").value.trim() || `专业训练_${new Date().toLocaleString("zh-CN")}`;
      if (!modelId) { App.toast("请选择基础模型", "error"); return; }
      if (datasetIds.length === 0) { App.toast("请至少选择一个数据集", "error"); return; }
      const params = {};
      Object.keys(paramConfig).forEach(key => {
        const v = parseFloat(document.getElementById(`param-${key}`).value);
        params[key] = isNaN(v) ? paramConfig[key].default : v;
      });
      const btn = document.getElementById("start-btn");
      btn.disabled = true; btn.textContent = "提交中...";
      try {
        const task = await App.api.post("/api/training", {
          name, model_id: modelId, dataset_ids: datasetIds, mode: "professional", params,
        });
        App.toast("训练已启动", "success");
        startStreaming(task.id);
        loadHistory();
      } catch (err) { App.toast(err.message, "error"); }
      finally { btn.disabled = false; btn.textContent = "开始专业训练"; }
    };

    function startStreaming(taskId) {
      // 显示进度卡片
      const card = document.getElementById("progress-card");
      card.style.display = "";
      // 重置 loss
      lossVals = [];
      if (lossChartTimer) { clearTimeout(lossChartTimer); lossChartTimer = null; }
      drawLossChart();
      document.getElementById("cur-loss").textContent = "-";
      document.getElementById("loss-count").textContent = "0";

      const logBox = document.getElementById("log-box");
      const pFill = document.getElementById("p-fill");
      const pct = document.getElementById("pct");
      const tStatus = document.getElementById("t-status");
      logBox.innerHTML = "";

      App.streamSSE(`/api/training/${taskId}/log/stream`, (msg) => {
        if (msg.type === "log") {
          const line = document.createElement("div");
          line.className = "log-line";
          const txt = msg.content || "";
          if (txt.includes("错误") || txt.includes("失败")) line.classList.add("error");
          else if (txt.includes("完成") || txt.includes("✓") || txt.includes("训练完成")) line.classList.add("success");
          else if (txt.includes("阶段") || txt.includes("----") || txt.includes("Epoch")) line.classList.add("info");
          line.textContent = txt;
          logBox.appendChild(line);
          logBox.scrollTop = logBox.scrollHeight;
          // 解析 loss
          const m = txt.match(/loss[=: ]+([0-9]+\.?[0-9]*)/i);
          if (m) appendLoss(parseFloat(m[1]));
        } else if (msg.type === "status") {
          const p = msg.progress ?? 0;
          pFill.style.width = p + "%";
          pct.textContent = p.toFixed(1) + "%";
          if (msg.status === "completed") { tStatus.className = "badge badge-success"; tStatus.textContent = "已完成"; }
          if (msg.status === "failed") { tStatus.className = "badge badge-danger"; tStatus.textContent = "失败"; }
        } else if (msg.type === "done") {
          App.toast("训练完成！", "success");
          // 收尾绘制
          if (lossChartTimer) { clearTimeout(lossChartTimer); lossChartTimer = null; }
          drawLossChart();
          loadHistory();
        }
      }).catch(err => {
        App.toast(err.message, "error");
        // SSE 失败时清理定时器并标记状态
        if (lossChartTimer) { clearTimeout(lossChartTimer); lossChartTimer = null; }
        tStatus.className = "badge badge-danger"; tStatus.textContent = "连接中断";
      });
    }

    async function loadHistory() {
      const el = document.getElementById("task-history");
      try {
        const list = await App.api.get("/api/training");
        if (list.length === 0) {
          el.innerHTML = `<div class="empty-state"><div class="empty-icon">✦</div><div class="empty-text">暂无训练任务</div></div>`;
          return;
        }
        el.innerHTML = list.map(t => `
          <div class="list-item">
            <div class="list-item-main">
              <div class="list-item-title">${App.escapeHtml(t.name)} <span class="tag">${t.mode === "simple" ? "傻瓜" : "专业"}</span></div>
              <div class="list-item-sub">${App.formatTime(t.created_at)} · 进度 ${(t.progress ?? 0).toFixed(0)}%</div>
            </div>
            <div class="flex items-center gap-1">
              ${App.statusBadge(t.status)}
              <button class="btn btn-ghost btn-sm" onclick="viewLog('${t.id}')">查看日志</button>
            </div>
          </div>
        `).join("");
      } catch (err) { App.toast(err.message, "error"); }
    }

    async function viewLog(id) {
      try {
        const data = await App.api.get(`/api/training/${id}/log`);
        const pre = document.createElement("pre");
        pre.className = "log-viewer";
        pre.style.maxHeight = "420px";
        pre.textContent = data?.data?.log || "（暂无日志）";
        App.modal({ title: "训练日志", body: pre });
      } catch (err) { App.toast(err.message, "error"); }
    }

    loadOptions();
    loadParams();
    loadHistory();
  </script>
</body>
</html>
