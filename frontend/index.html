<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMind - AI 训练平台</title>
  <link rel="stylesheet" href="/assets/css/polish.css">
  <link rel="icon" type="image/svg+xml" href="/assets/ease-mind-logo.svg">
</head>
<body>
  <script>
    // 已登录则跳转主页，否则跳转登录页
    const token = localStorage.getItem("easemind_token");
    let user;
    try { user = JSON.parse(localStorage.getItem("easemind_user") || "null"); }
    catch { user = null; localStorage.removeItem("easemind_user"); }
    if (token && user) {
      window.location.href = user.role === "admin" ? "/pages/admin-dashboard.html" : "/pages/chat.html";
    } else {
      window.location.href = "/pages/auth.html";
    }
  </script>
</body>
</html>
