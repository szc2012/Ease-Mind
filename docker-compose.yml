version: "3.8"

services:
  easemind:
    build: .
    container_name: easemind
    ports:
      - "8080:8080"
    volumes:
      # 持久化数据（模型、数据集、日志、数据库）
      - easemind-data:/app/data
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin123
      - TRAINING_MODE=real
      - MODEL_DOWNLOAD_MODE=real
      # 如需自定义 JWT 密钥，取消下行注释并修改
      # - SECRET_KEY=your-secret-key-here
    restart: unless-stopped
    # GPU 支持（如有 NVIDIA GPU）
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  easemind-data:
